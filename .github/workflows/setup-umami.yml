name: Setup Umami on VPS

on:
  workflow_dispatch:

jobs:
  setup:
    name: Install and start Umami
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy docker-compose.umami.yml to VPS and start Umami
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 83.228.221.136
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -qq
              sudo apt-get install -y docker.io docker-compose
              sudo usermod -aG docker ubuntu
            fi

            # Install docker-compose standalone if not present
            if ! command -v docker-compose &> /dev/null; then
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            # Copy compose file from repo
            cp ~/GlinsoWeb/docker-compose.umami.yml ~/docker-compose.umami.yml

            # Start Umami
            cd ~
            sudo docker-compose -f docker-compose.umami.yml up -d

            echo "✅ Umami started at http://83.228.221.136:3001"
            echo "Default login: admin / umami"
            sudo docker-compose -f docker-compose.umami.yml ps
