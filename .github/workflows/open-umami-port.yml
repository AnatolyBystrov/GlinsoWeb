name: Open Umami port on VPS

on:
  workflow_dispatch:

jobs:
  open-port:
    runs-on: ubuntu-latest
    steps:
      - name: Open port 3001 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 83.228.221.136
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== UFW status ==="
            sudo ufw allow 3001/tcp || true
            sudo ufw status
            echo "=== Docker containers ==="
            sudo docker ps -a
            echo "=== Listening ports ==="
            ss -tlnp | grep -E '3001|3000'
            echo "=== Docker logs (umami) ==="
            sudo docker logs $(sudo docker ps -aq --filter name=umami) --tail=20 2>/dev/null || echo "No umami container found"
